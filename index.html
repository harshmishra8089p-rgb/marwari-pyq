```html
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Marwari College BCA PYQ Portal</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f2f5ff;
    }

    header{
      background:#002855;
      color:white;
      padding:20px;
      text-align:center;
    }

    header h1{
      font-size:35px;
    }

    .container{
      width:90%;
      max-width:1100px;
      margin:auto;
      padding:30px 0;
    }

    .upload-box{
      background:white;
      padding:25px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
      margin-bottom:30px;
    }

    .upload-box h2{
      margin-bottom:20px;
      color:#002855;
    }

    label{
      display:block;
      margin-top:15px;
      margin-bottom:5px;
      font-weight:bold;
    }

    input, select{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:5px;
    }

    button{
      margin-top:20px;
      padding:12px 20px;
      background:#002855;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:#00152d;
    }

    .papers-section{
      margin-top:20px;
    }

    .papers-section h2{
      margin-bottom:20px;
      color:#002855;
    }

    .paper-card{
      background:white;
      padding:20px;
      border-radius:10px;
      margin-bottom:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    .paper-card h3{
      margin-bottom:5px;
    }

    .download-btn{
      background:green;
      color:white;
      padding:10px 15px;
      text-decoration:none;
      border-radius:5px;
    }

    .download-btn:hover{
      background:darkgreen;
    }

    footer{
      background:#002855;
      color:white;
      text-align:center;
      padding:15px;
      margin-top:40px;
    }

    @media(max-width:700px){

      .paper-card{
        flex-direction:column;
        align-items:flex-start;
        gap:15px;
      }

    }

  </style>

</head>

<body>

  <header>
    <h1>Marwari College BCA PYQ Portal</h1>
    <p>Previous Year Question Papers</p>
  </header>

  <div class="container">

    <div class="upload-box">

      <h2>Upload Question Paper</h2>
      <div class="card">
    <h2>BCA Sem 1 Viva Time Table</h2>

    <img src="https://raw.githubusercontent.com/harshmishra8089p-rgb/marwari-pyq/main/bca%20sem%201%20viva%20time%20table.png"
    width="300">

    <br><br>

    <a href="https://github.com/harshmishra8089p-rgb/marwari-pyq/blob/main/bca%20sem%201%20viva%20time%20table.png" target="_blank">
        View Full Image
    </a>
</div>

      <form id="uploadForm">

        <label>Subject Name</label>
        <input type="text" id="subject" required>

        <label>Semester</label>

        <select id="semester" required>

          <option value="">Select Semester</option>

          <option>Semester 1</option>
          <option>Semester 2</option>
          <option>Semester 3</option>
          <option>Semester 4</option>
          <option>Semester 5</option>
          <option>Semester 6</option>

        </select>

        <label>Year</label>
        <input type="number" id="year" required>

        <label>Upload PDF</label>
        <input type="file" id="file" accept=".pdf" required>

        <button type="submit">Upload PYQ</button>

      </form>

    </div>

    <div class="papers-section">

      <h2>Available Question Papers</h2>

      <div id="paperList"></div>

    </div>

  </div>

  <footer>
    <p>© 2026 Marwari College BCA Department</p>
  </footer>

  <script>

    const form = document.getElementById("uploadForm");

    const paperList = document.getElementById("paperList");

    let papers = JSON.parse(localStorage.getItem("papers")) || [];

    function displayPapers(){

      paperList.innerHTML = "";

      papers.forEach(function(paper){

        const div = document.createElement("div");

        div.classList.add("paper-card");

        div.innerHTML = `

          <div>

            <h3>${paper.subject}</h3>

            <p>${paper.semester}</p>

            <p>Year: ${paper.year}</p>

          </div>

          <a href="${paper.file}" download class="download-btn">
            Download PDF
          </a>

        `;

        paperList.appendChild(div);

      });

    }

    form.addEventListener("submit", function(e){

      e.preventDefault();

      const subject = document.getElementById("subject").value;

      const semester = document.getElementById("semester").value;

      const year = document.getElementById("year").value;

      const fileInput = document.getElementById("file");

      const file = fileInput.files[0];

      if(file){

        const reader = new FileReader();

        reader.onload = function(event){

          const paper = {

            subject: subject,

            semester: semester,

            year: year,

            file: event.target.result

          };

          papers.push(paper);

          localStorage.setItem("papers", JSON.stringify(papers));

          displayPapers();

          form.reset();

          alert("PYQ Uploaded Successfully!");

        };

        reader.readAsDataURL(file);

      }

    });

    displayPapers();

  </script>
<div class="card">
    <h2>BCA Sem 1 Viva Time Table</h2>

    <img src="https://raw.githubusercontent.com/harshmishra8089p-rgb/marwari-pyq/main/bca%20sem%201%20viva%20time%20table.png"
    width="300">

    <br><br>

    <a href="https://github.com/harshmishra8089p-rgb/marwari-pyq/blob/main/bca%20sem%201%20viva%20time%20table.png" target="_blank">
        View Full Image
    </a>
</div>
</body>

</html>
